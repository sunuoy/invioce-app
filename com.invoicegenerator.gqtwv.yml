Summary: Professional Billing Hub & Invoice Generator
Description: |
  A professional, offline-first Android application designed to streamline billing,
  invoicing, client directory management, and stock tracking. Built entirely with
  Kotlin, Jetpack Compose, Material 3, and Room Database, the app features dynamic,
  beautiful PDF invoice generation with payment QR codes, multiple visual themes,
  and robust backup capabilities.

